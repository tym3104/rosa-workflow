.toggle.on{background:#ecfdf5;border-color:#6ee7b7;color:#065f46}
.toggle .bx{margin-top:1px;flex:0 0 auto;width:20px;height:20px;border-radius:6px;border:2px solid var(--line2);display:flex;align-items:center;justify-content:center;color:#fff}
.toggle.on .bx{background:#10b981;border-color:#10b981}

.step.done{background:#ecfdf5;color:#047857}

function parseSubText(txt){var subs=[],cur=null,ronten=null;String(txt==null?'':txt).split(/\r?\n/).forEach(function(raw){if(!raw.trim())return;var hm=raw.match(/^\s*#\s*(.*)$/);if(hm){if(ronten===null){var rt=hm[1].trim();if(rt)ronten=rt;}return;}var indent=(raw.match(/^[\t ]*/)[0]).replace(/\t/g,'  ').length;var text=raw.replace(/^[\t ]+/,'').replace(/^[-*・•]\s*/,'').trim();if(!text)return;if(indent>=2&&cur){cur.children.push({id:uid(),text:text});}else{cur={id:uid(),text:text,children:[]};subs.push(cur);}});return {ronten:ronten,subs:subs};}

function todayDate(){var n=new Date();return new Date(n.getFullYear(),n.getMonth(),n.getDate());}
function isTaskDone(c){return (c.taskStatus||"todo")==="done";}
function isImportant(c){return c.importance==="high";}
function isUrgent(c){
 if(isTaskDone(c))return false;
 if(c.urgencyOverride==="high")return true;
 if(c.urgencyOverride==="low")return false;
 var D=parseDate(c.deadline);if(!D)return false;
 var t=todayDate();if(D<t)return true; // 超過は緊急
 return countBizDays(t,D)<=URGENT_BIZ_DAYS;
}
function quadrant(c){var u=isUrgent(c),im=isImportant(c);return im?(u?"q1":"q2"):(u?"q3":"q4");}
function quadRank(c){return {q1:0,q2:1,q3:2,q4:3}[quadrant(c)];}
function statusInfo(c){return ({todo:["未着手","todo"],doing:["進行中","doing"],hold:["保留","hold"],done:["完了","done"]})[c.taskStatus||"todo"];}
function deadlineInfo(c){
 if(!c.deadline)return {text:"締切なし",cls:"todo"};
 if(isTaskDone(c))return {text:"締切 "+c.deadline,cls:"todo"};
 var D=parseDate(c.deadline),t=todayDate();
 if(D<t)return {text:"締切超過",cls:"over"};
 var n=countBizDays(t,D);
 return {text:n===0?"本日締切":"残り"+n+"営業日",cls:n<=URGENT_BIZ_DAYS?"urg":"todo"};
}

function rontenCtx(text){return text?'<div style="margin-bottom:12px;padding:10px;border-radius:8px;background:#f8fafc;border:1px solid var(--line);color:#475569;font-size:14px"><span class="xsmall muted">論点</span><br>'+esc(text)+'</div>':'';}

/* ===== views ===== */
function render(){
 var root=document.getElementById('root');
 if(state.reporting&&sel()){root.innerHTML=viewReport(sel());bindInputs();return;}
 var html='';
 html+='<div class="hdr"><div class="hdr-in">';
 html+='<button class="logo" data-click="home"><span class="mk">ロサ</span><span><span class="t1">ロ→サ→T→ス→作→ア</span><br><span class="t2">論点思考ワークフロー</span></span></button>';
 html+='<div class="row gap2">';
 html+='<button class="btn btn-line btn-sm" data-click="manual">'+ic('book')+'<span>操作マニュアル</span></button>';
 html+='<button class="btn btn-line btn-sm" data-click="import">'+ic('ul')+'<span>読み込み</span></button>';
 html+='<button class="btn btn-dark btn-sm" data-click="export">'+ic('dl')+'<span>書き出し</span></button>';
 html+='</div></div></div>';
 html+='<main><div class="wrap">'+(sel()?viewDetail(sel()):viewList())+'</div></main>';
 if(!sel()){var foot='';if(LLM_CONFIG.enabled)foot+=llmPanelHtml();foot+='<div class="banner" data-click="llmTap" title="" style="background:#f8fafc;border:1px solid var(--line);color:var(--mut2)">'+ic('alert',16)+'<span>案件データはクラウドに保管しません。このブラウザ内（localStorage）にのみ保存されます（自動的な外部送信はありません）。確実に残すには、右上の「書き出し」でJSONをバックアップし、「読み込み」で復元してください。※任意の「AI構造化（Anthropic API）」「Outlook連携（Microsoft Graph）」を使う場合のみ、その内容が各サービスへ送信されます。</span></div>';html+='<div class="wrap foot">'+foot+'</div>';}
 if(state.modal)html+=viewModal();
 root.innerHTML=html;
 bindInputs();
}

function outlookBar(){
 var h='<div class="row gap2 center wrapf">';
 if(_acct){
  h+='<span class="badge done">'+ic('cal',11)+' Outlook接続中'+(_acct.username?'：'+esc(_acct.username):'')+'</span>';
  h+='<button class="btn btn-line btn-sm" data-click="outlookSyncToday">'+ic('cal',13)+'<span>今日の予定を同期</span></button>';
  h+='<button class="btn-ghost btn-sm" data-click="outlookSignOut">切断</button>';
 }else{
  h+='<button class="btn btn-dark btn-sm" data-click="outlookSignIn">'+ic('cal',13)+'<span>Outlook連携</span></button>';
 }
 h+='<button class="btn-ghost btn-sm" data-click="outlookSetup" title="Outlook設定">'+ic('gear',14)+'</button>';
 h+='</div>';
 return h;
}
function taskCardHtml(c){
 var segs='';STEPS.forEach(function(s){segs+='<i style="background:'+(c.stepDone[s.key]?'#34d399':'var(--line)')+'"></i>';});
 var di=deadlineInfo(c),si=statusInfo(c),tIso=fmtISO(todayDate());
 var today=(c.planDate===tIso),ol=c.outlook&&c.outlook.eventId;
 var h='<div class="tcard">';
 h+='<div class="row between center" style="gap:8px"><button class="tctitle" data-click="open" data-id="'+c.id+'">'+esc(c.title||"（無題のタスク）")+'</button>';
 h+='<button class="star '+(isImportant(c)?'on':'off')+'" data-click="impToggle" data-id="'+c.id+'" title="重要度（クリックで切替）">'+(isImportant(c)?'★':'☆')+'</button></div>';
 h+='<div class="row gap2 wrapf" style="margin-top:5px">';
 h+='<span class="badge '+si[1]+'">'+si[0]+'</span>';
 h+='<span class="badge '+di.cls+'">'+ic('clock',11)+di.text+'</span>';
 if(isUrgent(c))h+='<span class="badge urg">緊急</span>';
 if(isResearch(c))h+='<span class="badge research">リサーチ</span>';
 if(c.requester)h+='<span class="xsmall muted">依頼:'+esc(c.requester)+'</span>';
 h+='</div>';
 h+='<div class="seg" style="margin-top:7px">'+segs+'</div>';
 h+='<div class="row between wrapf gap2" style="margin-top:9px">';
 h+='<div class="row gap2 center">';
 h+='<select class="inp inp-sm" data-act="cStatus" data-id="'+c.id+'" data-render="1">'+['todo','doing','hold','done'].map(function(k){var lbl={todo:'未着手',doing:'進行中',hold:'保留',done:'完了'}[k];return '<option value="'+k+'" '+((c.taskStatus||'todo')===k?'selected':'')+'>'+lbl+'</option>';}).join('')+'</select>';
 h+='<button class="btn btn-line btn-sm'+(today?' on-today':'')+'" data-click="todayToggle" data-id="'+c.id+'">'+(today?'今日やる ✓':'今日やる')+'</button>';
 h+='<button class="btn btn-line btn-sm'+(isResearch(c)?' on-research':'')+'" data-click="researchToggle" data-id="'+c.id+'" title="リサーチタスクとして印を付ける（一覧で絞り込めます）">'+(isResearch(c)?'リサーチ ✓':'リサーチ')+'</button>';
 h+='</div>';
 h+='<div class="row gap2 center">';
 h+='<button class="btn btn-line btn-sm" data-click="outlookSync" data-id="'+c.id+'" title="このタスクをOutlookカレンダーに作成/更新">'+ic('cal',13)+'<span>'+(ol?'同期済':'Outlook')+'</span></button>';
 h+='<button class="icon-x" data-click="del" data-id="'+c.id+'">'+ic('trash',14)+'</button>';
 h+='</div></div></div>';
 return h;
}
function viewList(){
 var t=todayDate(),tIso=fmtISO(t);
 var active=state.cases.filter(function(c){return !isTaskDone(c);});
 var done=state.cases.filter(isTaskDone);
 if(_researchFilter&&!state.cases.some(isResearch))_researchFilter=false;
 if(_researchFilter){active=active.filter(isResearch);done=done.filter(isResearch);}
 function byDeadline(a,b){var A=parseDate(a.deadline),B=parseDate(b.deadline);if(A&&B)return A-B;if(A)return -1;if(B)return 1;return 0;}
 var todays=active.filter(function(c){if(c.planDate===tIso)return true;var D=parseDate(c.deadline);if(D&&(D<t||fmtISO(D)===tIso))return true;return isUrgent(c);})
   .sort(function(a,b){return (quadRank(a)-quadRank(b))||byDeadline(a,b);});
 var h='';
 // toolbar
 h+='<div class="row gap2 wrapf center mb3">';
 h+='<button class="btn btn-outline" data-click="slide">'+ic('img')+'<span>フレーム図解</span></button>';
 h+='<button class="btn btn-outline" data-click="manual">'+ic('book')+'<span>使い方マニュアル</span></button>';
 h+='<button class="btn btn-outline" data-click="sources">'+ic('book')+'<span>出典</span></button>';
 if(state.cases.some(isResearch))h+='<button class="btn btn-outline'+(_researchFilter?' on-research':'')+'" data-click="researchFilterToggle" title="リサーチタスクだけを表示">'+ic('spark',15)+'<span>'+(_researchFilter?'リサーチのみ ✓':'リサーチのみ')+'</span></button>';
 h+='<div style="flex:1;min-width:8px"></div>'+outlookBar();
 h+='</div>';
 // greeting
 var doing=active.filter(function(c){return (c.taskStatus||'todo')==='doing';}).length;
 var urg=active.filter(isUrgent).length;
 h+='<div class="dash-greet"><div class="big">'+new Date().toLocaleDateString("ja-JP",{year:'numeric',month:'long',day:'numeric',weekday:'short'})+' のタスク</div>';
 h+='<div class="sum">今日のタスク <b>'+todays.length+'</b> 件　／　緊急 <b style="color:var(--accent-text)">'+urg+'</b> 件　／　進行中 <b>'+doing+'</b> 件　／　未完了 <b>'+active.length+'</b> 件</div></div>';
 // header + new
 h+='<div class="row between mb3 center"><h1 style="font-size:18px;font-weight:700;margin:0">タスク管理</h1><div class="row gap2">';
 if(state.cases.length===0)h+='<button class="btn btn-line btn-sm" data-click="sample">サンプルを追加</button>';
 h+='<button class="btn btn-brand btn-sm" data-click="new">'+ic('plus')+'<span>新規タスク</span></button></div></div>';
 if(state.cases.length===0){
  h+='<div style="text-align:center;padding:56px 0;color:var(--mut2)"><p>まだタスクがありません。</p><p>仕事の依頼が来たら「新規タスク」から、論点思考で1件を立ち上げましょう。</p></div>';
  return h;
 }
 // 今日のタスク
 h+='<div class="dash-h2">'+ic('clock',16)+'今日のタスク</div>';
 if(todays.length===0)h+='<p class="small muted">今日着手するタスクはありません。下のマトリクスで「今日やる」を選ぶか、緊急のものから着手しましょう。</p>';
 else todays.forEach(function(c){h+=taskCardHtml(c);});
 // アイゼンハワー
 h+='<div class="dash-h2">'+ic('spark',16)+'アイゼンハワー・マトリクス（重要度 × 緊急度）</div>';
 h+='<p class="xsmall muted" style="margin:-4px 0 10px">緊急度は締切までの残り営業日（'+URGENT_BIZ_DAYS+'営業日以下／超過で緊急）から自動判定。重要度は各カードの ★ で切り替え。</p>';
 var quads=[['q1','第一象限：今すぐやる','重要 × 緊急'],['q2','第二象限：計画してやる（最重要ゾーン）','重要 × 緊急でない'],['q3','第三象限：素早く片付ける・任せる','重要でない × 緊急'],['q4','第四象限：やらない／後回し','重要でない × 緊急でない']];
 h+='<div class="quad-grid">';
 quads.forEach(function(q){
  var list=active.filter(function(c){return quadrant(c)===q[0];}).sort(byDeadline);
  h+='<div class="quad '+q[0]+'"><h4>'+q[1]+'<span class="xsmall muted" style="font-weight:400">'+q[2]+'</span></h4>';
  if(list.length===0)h+='<p class="xsmall muted">—</p>';else list.forEach(function(c){h+=taskCardHtml(c);});
  h+='</div>';
 });
 h+='</div>';
 // 完了タスク
 if(done.length){
  h+='<div class="dash-h2">'+ic('circleChk',16)+'完了タスク（'+done.length+'）<button class="btn-ghost btn-sm" data-click="showDone" style="font-weight:400">'+(_showDone?'隠す':'表示')+'</button></div>';
  if(_showDone)done.sort(byDeadline).forEach(function(c){h+=taskCardHtml(c);});
 }
 return h;
}

function viewDetail(c){
 var step=STEPS[c.currentStep];var locked=step.key!=="ronten";
 var h='';
 h+='<div class="row between mb3"><button class="btn-ghost" data-click="back">'+ic('aL')+'<span>一覧へ</span></button><div class="row gap3"><button class="btn-ghost" style="color:var(--brand);font-weight:500" data-click="report">'+ic('print',15)+'<span>レポート</span></button><button class="btn-ghost" data-click="del" data-id="'+c.id+'">'+ic('trash',15)+'<span>削除</span></button></div></div>';
 // case header
 h+='<div class="card">';
 if(locked)h+='<div class="row gap2 xsmall muted mb2">'+ic('lock',12)+'<span>案件情報は「ロ（論点）」ページでのみ編集できます。</span></div>';
 h+='<div class="field"><label class="lbl">案件名（依頼の一言）</label><textarea class="inp" rows="2" data-act="cTitle" '+(locked?'disabled':'')+' placeholder="例：来期の営業戦略を整理してほしい">'+esc(c.title)+'</textarea></div>';
 h+='<div class="grid2">';
 h+='<div class="field" style="margin:0"><label class="lbl">依頼者</label><input class="inp" data-act="cReq" value="'+esc(c.requester)+'" '+(locked?'disabled':'')+' placeholder="例：部長"></div>';
 h+='<div class="field" style="margin:0"><label class="lbl">締切</label><input class="inp" type="date" data-act="cDead" data-render="1" value="'+esc(c.deadline)+'" '+(locked?'disabled':'')+'></div>';
 h+='</div>';
 h+='<div class="field" style="margin:16px 0 0"><label class="lbl">依頼内容メモ</label><textarea id="cMemoTa" class="inp" rows="10" data-act="cMemo" '+(locked?'disabled':'')+' placeholder="言われた言葉をそのまま">'+esc(c.requestMemo)+'</textarea></div>';
 h+='</div>';
 // stepper
 h+='<div class="card" style="overflow-x:auto"><div class="stepper">';
 STEPS.forEach(function(s,i){
  var cls="step"+(i===c.currentStep?" on":(c.stepDone[s.key]?" done":""));
  h+='<button class="'+cls+'" data-click="go" data-i="'+i+'"><span class="k">'+s.short+'</span><span class="l">'+s.label+'</span>'+((c.stepDone[s.key]&&i!==c.currentStep)?'<span class="dot">'+ic('check',12)+'</span>':'')+'</button>';
  if(i===1)h+='<div class="stepdiv" title="ロ・サ（論点思考）で問いを固めてから、T以降（実行）へ進む。いきなりTに飛ばない。"><span class="bar"></span></div>';
 });
 h+='</div></div>';
 // body
 h+='<div class="card"><div class="row gap2 center" style="margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #f1f5f9"><div style="width:36px;height:36px;border-radius:8px;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;font-weight:700">'+step.short+'</div><div><div class="bold">'+step.short+'（'+step.label+'）― '+step.sub+'</div><div class="xsmall muted">成果物：'+step.deliverable+'</div></div></div>';
 h+=stepBody(c,step.key);
 // nav
 h+='<div class="row between mt4" style="padding-top:16px;border-top:1px solid #f1f5f9">';
 h+='<button class="btn-ghost" data-click="prev" '+(c.currentStep===0?'disabled style="opacity:.3"':'')+'>'+ic('aL',15)+'<span>戻る</span></button>';
 if(c.currentStep<STEPS.length-1){
  h+='<button class="btn btn-brand" data-click="next">確認して次へ：'+STEPS[c.currentStep+1].short+'（'+STEPS[c.currentStep+1].label+'） '+ic('aR',15)+'</button>';
 }else{
  h+='<div class="row gap2"><button class="btn btn-outline" data-click="report">'+ic('print',15)+'<span>レポート</span></button><button class="btn btn-emerald" data-click="complete">'+ic('circleChk',16)+'<span>案件を完了して一覧へ</span></button></div>';
 }
 h+='</div></div>';
 return h;
}

function stepBody(c,k){
 if(k==="ronten")return stepRonten(c);
 if(k==="sub")return stepSub(c);
 if(k==="task")return stepTask(c);
 if(k==="schedule")return stepSchedule(c);
 if(k==="work")return stepWork(c);
 if(k==="output")return stepOutput(c);
 if(k==="discussion")return stepDiscussion(c);
 return '';
}
function guide(html){return '<div class="guide">'+ic('bulb',16)+'<div>'+html+'</div></div>';}

function stepRonten(c){
 var r=c.ronten;var h=guide('まず<b>「この依頼で最終的に答えるべき問いは何か？」</b>を<b>一文</b>に言語化する。これが論点。<b>セルフチェック3つを満たすまでサブ論点へは進めません。</b>');
 h+='<div class="field"><label class="lbl">論点（解くべき問いを一文で）</label><textarea class="inp" rows="5" data-act="rText" placeholder="例：限られたリソースをどの顧客に集中すれば売上を最大化できるか？">'+esc(r.text)+'</textarea><div class="hint">「〜を作る」ではなく「〜は何か？／どうすべきか？」という問いの形に。</div></div>';
 h+='<p class="lbl">セルフチェック（すべて必須）</p><div style="display:flex;flex-direction:column;gap:8px">';
 h+=toggleHtml("rc_isQuestion",r.checks.isQuestion,"「作業」ではなく「問い」の形になっている");
 h+=toggleHtml("rc_matchesGoal",r.checks.matchesGoal,"依頼者の本当のゴールと一致している（言葉の裏側を確認した）");
 h+=toggleHtml("rc_oneSentence",r.checks.oneSentence,"一文で言い切れる");
 h+='</div>';return h;
}
function stepSub(c){
 var h=guide('<b>「この論点に答えるには、どんな問いを解けばよいか？」</b>を MECE に分解。サブサブへ深掘りするとアウトプットが進化する。');
 h+=rontenCtx(c.ronten.text);
 h+='<div style="display:flex;flex-direction:column;gap:10px">';
 c.subRonten.forEach(function(s,i){
  h+='<div style="border:1px solid var(--line);border-radius:8px;padding:10px">';
  h+='<div class="row gap2"><span class="bold xsmall" style="width:28px;flex:0 0 auto;color:var(--brand)">サ'+(i+1)+'</span><input class="inp" data-act="sText" data-id="'+s.id+'" value="'+esc(s.text)+'" placeholder="サブ論点を入力"><button class="icon-x" data-click="delSub" data-id="'+s.id+'">'+ic('trash',15)+'</button></div>';
  h+='<div style="padding-left:36px;margin-top:8px;display:flex;flex-direction:column;gap:8px">';
  (s.children||[]).forEach(function(ch){h+='<div class="row gap2"><span class="xsmall" style="color:#cbd5e1;flex:0 0 auto">└</span><input class="inp" data-act="scText" data-pid="'+s.id+'" data-cid="'+ch.id+'" value="'+esc(ch.text)+'" placeholder="サブサブ論点（任意）"><button class="icon-x" data-click="delChild" data-pid="'+s.id+'" data-cid="'+ch.id+'">'+ic('trash',14)+'</button></div>';});
  h+='<button class="btn-ghost xsmall" style="color:var(--brand);padding:0" data-click="addChild" data-id="'+s.id+'">'+ic('plus',12)+'<span>サブサブ論点を追加</span></button>';
  h+='</div></div>';
 });
 h+='</div><button class="dash mt3" data-click="addSub">'+ic('plus',15)+'<span>サブ論点を追加</span></button>';
 h+='<div class="mt4" style="padding-top:14px;border-top:1px dashed var(--line)">';
 h+='<div class="row between gap2" data-click="subEditorToggle" style="cursor:pointer;padding:4px 0"><span class="small bold" style="color:#334155">テキストで一括編集（書き出し／読み込み）</span><span style="flex:0 0 auto;color:var(--mut2)">'+ic(_subEditorOpen?'up':'down',16)+'</span></div>';
 if(_subEditorOpen){
  h+='<div class="mt2">';
  h+='<div class="row gap2 mb2"><button class="btn btn-line btn-sm" data-click="exportSub">'+ic('dl',13)+'<span>書き出し</span></button><button class="btn btn-line btn-sm" data-click="importSub">'+ic('ul',13)+'<span>読み込み</span></button></div>';
  h+='<div class="xsmall muted mb2">論点・サブ論点・サブサブ論点をまとめてテキストで編集（「書き出し」→ 編集 →「読み込み」で反映）。先頭「# 」で論点、1行＝1サブ論点、行頭にスペース2つ＋「- 」でサブサブ論点。</div>';
  h+='<textarea id="subtextin" class="inp" data-act="subText" rows="10" placeholder="例：&#10;# 製造業に賭けるべきか？（論点）&#10;- 製造業への賭けは堅いか&#10;  - 法改正需要は一過性か持続的か&#10;  - 競合・市場規模はどうか&#10;- 量で伸びているか、単価込みで伸びているか" style="width:100%;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;line-height:1.6;resize:vertical">'+esc(_subText)+'</textarea>';
  h+='</div>';
 }
 h+='</div>';
 h+='<div class="mt4" style="padding-top:16px;border-top:1px solid #f1f5f9"><div class="banner banner-accent mb3">'+ic('alert',16)+'<span><b>サブ論点を詰めずに TASK へ進まない。</b>「何を解くか」を固め、<b>依頼者と内容を合意</b>してから次（T）へ。</span></div>';
 h+=toggleHtml("subAgree",!!c.subAgreed,"依頼者とサブ論点の内容について合意を得た")+'</div>';
 return h;
}
function stepTask(c){
 var opts=flattenSubs(c.subRonten).filter(function(o){return o.text.trim();});
 var h=guide('<b>「論点・サブ論点を解くために必要なTASKは？」</b>と自問して設計。<b>解くサブ論点にチェック</b>→<b>タスク名を入力して「タスクを追加」</b>。1タスクで複数サブ論点もOK。<b>すべてのサブ論点にタスクを割り当てるまでスケジュールへ進めません。</b>');
 h+=rontenCtx(c.ronten.text);
 if(opts.length===0){h+='<p class="small" style="color:var(--accent)">先に「サ（サブ論点）」を入力してください。</p>';return h;}
 // A. サブ論点（チェックボックス＋T番号タグ）
 h+='<div style="margin-bottom:12px;padding:10px;border-radius:8px;background:#f8fafc;border:1px solid var(--line)"><div class="xsmall muted mb2">サブ論点（解く対象をチェック → 下でタスク名を入力して追加）</div>';
 opts.forEach(function(o){
  var tnums=[];c.tasks.forEach(function(t,idx){if(getLinks(t).indexOf(o.id)>=0)tnums.push(idx+1);});
  var badges=tnums.map(function(n){return '<span class="chip on" style="padding:1px 7px;font-size:11px;cursor:default">T'+n+'</span>';}).join(' ');
  if(o.linkable===false){h+='<div class="small" style="margin-left:'+(o.level===2?16:0)+'px;color:#334155;line-height:1.9"><b style="color:'+(o.level===2?TERTIARY:BRAND)+'">'+o.tag+'</b> '+esc(o.text)+' <span class="xsmall muted">サブサブ論点で紐付け（対象外）</span></div>';return;}

function manualHtml(){

 h+='<div style="border:1px solid var(--brand-border);background:var(--brand-soft);border-radius:8px;padding:10px 12px;margin-bottom:12px" class="row between center wrapf gap2"><span class="small" style="color:var(--brand-dark)">'+ic('bulb',15)+' まずは全体像から。各工程の意味と<b>「論点から始める」</b>考え方は<b>フレーム図解</b>で。</span><button class="btn btn-outline btn-sm" data-click="slide">'+ic('img',14)+'<span>フレーム図解を見る</span></button></div>';
 h+='<div style="border:1px solid var(--line);border-radius:8px;padding:12px;margin-bottom:12px"><b class="small">0. 案件をつくる</b><div class="small" style="margin-top:4px;color:#475569">「新規案件」を押し、案件名（依頼の一言）・依頼者・締切・依頼内容メモを入力。<b>案件情報は「ロ」ページでのみ編集可能</b>（他ステップでは保護のためロック表示）。</div></div>';
 h+='<ol style="padding-left:20px;line-height:1.7;margin:0">';
 h+='<li class="small mb2"><b>ロ（論点）</b>：最終的に答えるべき問いを<b>一文の“問い”</b>で記入。<br><span style="color:#475569">→進む条件：セルフチェック3つ（①問いの形になっている ②依頼者のゴールと一致 ③一文で言える）を<b>すべてON</b>。</span></li>';
 h+='<li class="small mb2"><b>サ（サブ論点）</b>：論点をMECEに分解。「サブサブ論点を追加」でさらに階層化できます。<br><span style="color:#475569">→進む条件：サブ論点を<b>1つ以上</b>入力し、<b>「依頼者と合意した」にチェック</b>。</span></li>';

/* ===== event wiring ===== */
function findSub(c,id){return (c.subRonten||[]).filter(function(s){return s.id===id;})[0];}
function findTask(c,id){return (c.tasks||[]).filter(function(t){return t.id===id;})[0];}
function findMat(c,tid,mid){var t=findTask(c,tid);return t?(t.materials||[]).filter(function(m){return m.id===mid;})[0]:null;}
function applySchedule(c){
 var norm=normalizeSchedule(c.tasks||[]);var byId={};norm.forEach(function(t){byId[t.id]=t;});
 (c.tasks||[]).forEach(function(t){if(byId[t.id])t.start=byId[t.id].start;});
}
function fmtISO(d){var m=d.getMonth()+1,day=d.getDate();return d.getFullYear()+'-'+(m<10?'0'+m:m)+'-'+(day<10?'0'+day:day);}
function addDays(d,n){var x=new Date(d.getTime());x.setDate(x.getDate()+n);return x;}
function isHoliday(d){return !!HOLIDAYS[fmtISO(d)];}
function isBiz(d){var w=d.getDay();return w!==0&&w!==6&&!isHoliday(d);}
function lastBizOnOrBefore(d){var x=new Date(d.getTime());while(!isBiz(x))x=addDays(x,-1);return x;}
function prevBiz(d){var x=addDays(d,-1);while(!isBiz(x))x=addDays(x,-1);return x;}
function subBizDays(d,n){var x=new Date(d.getTime());var k=0;while(k<n){x=addDays(x,-1);if(isBiz(x))k++;}return x;}
function countBizDays(from,to){var x=new Date(from.getTime());var k=0;while(x<to){x=addDays(x,1);if(isBiz(x))k++;}return k;}
function defaultBuffer(c){var D=parseDate(c.deadline);if(!D)return 0;var now=new Date();var today=new Date(now.getFullYear(),now.getMonth(),now.getDate());if(D<=today)return 0;return Math.ceil(countBizDays(today,D)*0.1);}
function bufferBizOf(c){return (c.bufferBizDays!=null&&c.bufferBizDays!=='')?Math.max(0,parseInt(c.bufferBizDays,10)||0):defaultBuffer(c);}
function autoSchedule(){
 var c=sel();if(!c)return;
 var tasks=c.tasks||[];
 if(!tasks.length){window.alert('タスクがありません。');return;}
 var D=parseDate(c.deadline);
 if(!D){window.alert('先に「締切」を設定してください。');return;}
 var now=new Date();var today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
 if(D<today){window.alert('締切が本日より過去のため自動設定できません。締切を見直してください。');return;}
 var byId={};tasks.forEach(function(t){byId[t.id]=t;});
 // 循環チェック・深さ（複数先行対応のDFS）
 var depth={},vstate={},cyc=false;
 function calcDepth(t){if(vstate[t.id]===1){cyc=true;return 0;}if(depth[t.id]!=null)return depth[t.id];vstate[t.id]=1;var mx=0;getPreds(t).forEach(function(pid){var pr=byId[pid];if(pr){var d=calcDepth(pr)+1;if(d>mx)mx=d;}});vstate[t.id]=2;depth[t.id]=mx;return mx;}
 tasks.forEach(function(t){calcDepth(t);});
 if(cyc){window.alert('先行タスクの指定が循環しています。先行タスクを見直してください。');return;}
 // 後続マップ
 var succs={};tasks.forEach(function(t){succs[t.id]=[];});
 tasks.forEach(function(t){getPreds(t).forEach(function(pid){if(succs[pid])succs[pid].push(t.id);});});
 // 所要営業日数：見積hあり→ceil(h/8)、なし→1営業日
 function durBiz(t){var h=parseFloat(t.estHours);return (!isNaN(h)&&h>0)?Math.max(1,Math.ceil(h/8)):1;}
 // 締切から逆算：後続（深さの大きいもの）から処理
 var order=tasks.map(function(t,i){return {t:t,i:i};});
 order.sort(function(a,b){return (depth[b.t.id]-depth[a.t.id])||(b.i-a.i);});
 // 締切バッファ：締切のバッファ営業日数だけ手前を最終タスクの終了基準にする
 var buffer=bufferBizOf(c);
 var anchor=lastBizOnOrBefore(D);
 if(buffer>0)anchor=subBizDays(anchor,buffer);
 var result={};
 order.forEach(function(o){
  var t=o.t,ss=succs[t.id],end;
  if(!ss.length){end=anchor;}
  else{var m=null;ss.forEach(function(sid){if(result[sid]){var pb=prevBiz(result[sid]._s);if(!m||pb<m)m=pb;}});end=m||anchor;}
  if(!isBiz(end))end=lastBizOnOrBefore(end);
  var start=subBizDays(end,durBiz(t)-1);
  result[t.id]={start:fmtISO(start),end:fmtISO(end),_s:start};
 });
 // 開始が本日より過去になるタスクはエラー（本日開始は許容）
 var bad=[];tasks.forEach(function(t){if(result[t.id]._s<today)bad.push(t.text||'（無題）');});
 if(bad.length){window.alert('締切から逆算すると、開始日が本日より過去になるタスクがあります：\n・'+bad.join('\n・')+'\n\n締切を延ばす／バッファ営業日数を減らす／見積時間・先行タスクを見直してください。');return;}
 tasks.forEach(function(t){t.start=result[t.id].start;t.end=result[t.id].end;});
 save();render();
}
function refreshWork(c,tid){
 var t=findTask(c,tid);if(!t)return;
 var ready=!!((t.result||'').trim());
 var hint=document.getElementById('whint-'+tid);
 var btn=document.getElementById('wdone-'+tid);
 if(hint){hint.style.color=t.done?'#059669':(ready?'#64748b':ACCENT);hint.textContent=t.done?'完了済み':(ready?'完了にできます':'作業結果を入力してください');}
 if(btn){btn.disabled=(!t.done&&!ready);}
}
function canAdvance(c){
 var k=STEPS[c.currentStep].key;
 if(k==='ronten'){var ch=c.ronten.checks;if(!(ch.isQuestion&&ch.matchesGoal&&ch.oneSentence))return 'セルフチェック3つをすべて満たしてください。';}
 if(k==='sub'){var subs=(c.subRonten||[]).filter(function(s){return (s.text||'').trim();});if(subs.length===0)return 'サブ論点を1つ以上入力してください。';if(!c.subAgreed)return '「依頼者とサブ論点の内容について合意を得た」にチェックを入れてください。';}
 if(k==='task'){var opts=flattenSubs(c.subRonten).filter(function(o){return o.text.trim();});if(opts.length===0)return '先にサブ論点を入力してください。';if((c.tasks||[]).length===0)return 'タスクを1つ以上追加してください。';var unassigned=opts.filter(function(o){return o.linkable!==false&&!c.tasks.some(function(t){return getLinks(t).indexOf(o.id)>=0;});});if(unassigned.length>0)return 'すべてのサブ論点にタスクを割り当ててください。';}
 if(k==='schedule'){var bad=(c.tasks||[]).some(function(t){return t.start&&t.end&&parseDate(t.end)&&parseDate(t.start)&&parseDate(t.end)<parseDate(t.start);});var over=(c.tasks||[]).some(function(t){return t.end&&c.deadline&&parseDate(t.end)&&parseDate(c.deadline)&&parseDate(t.end)>parseDate(c.deadline);});if(bad)return '終了日が開始日より前のタスクがあります。';if(over)return '締切より後の終了日のタスクがあります。';}
 if(k==='work'){if((c.tasks||[]).length===0)return '先にタスクを入力してください。';if(!c.tasks.every(function(t){return t.done;}))return 'すべてのタスクを完了にしてください。';}
 if(k==='output'){if(!c.output.checks.separate)return '下のチェックをつけてください。';}
 return null;
}
function onAct(act,el){
 var v=el.value;
 var id=el.getAttribute('data-id'),pid=el.getAttribute('data-pid'),cid=el.getAttribute('data-cid'),tid=el.getAttribute('data-tid'),mid=el.getAttribute('data-mid');
 // 一覧（タスク管理）/設定など、選択中の案件に依存しない入力を先に処理
 switch(act){
  case 'cStatus':{var cs=caseById(id);if(cs){cs.taskStatus=v;if(v==='done')cs.planDate='';}save();if(el.getAttribute('data-render')==='1')render();return;}
  case 'gClientId':GRAPH_CONFIG.clientId=(v||'').trim();_msal=null;_acct=null;saveGraphCfg();return;
  case 'gTenant':GRAPH_CONFIG.tenant=(v||'').trim()||'common';_msal=null;_acct=null;saveGraphCfg();return;
  case 'subText':_subText=v;return;
  case 'llmDraft':_llmDraft=v;return;
  case 'llmDeadline':_llmDraftDeadline=v;return;
  case 'llmKey':LLM_CONFIG.apiKey=(v||'').trim();saveLlmCfg();return;
  case 'llmModel':LLM_CONFIG.model=v||'claude-opus-4-8';saveLlmCfg();return;
 }
 var c=sel();if(!c)return;
 switch(act){
  case 'cTitle':c.title=v;break;
  case 'cReq':c.requester=v;break;
  case 'cDead':c.deadline=v;break;
  case 'cMemo':c.requestMemo=v;break;
  case 'rText':c.ronten.text=v;break;
  case 'sText':{var s=findSub(c,id);if(s)s.text=v;break;}
  case 'scText':{var s2=findSub(c,pid);if(s2){var ch=(s2.children||[]).filter(function(x){return x.id===cid;})[0];if(ch)ch.text=v;}break;}
  case 'tText':{var t=findTask(c,id);if(t)t.text=v;break;}
  case 'taskName':_taskName=v;return;
  case 'predSearch':{_predQuery=v;_predPick=null;var prows=document.querySelectorAll('[data-predrow="'+id+'"]');var pq=(v||'').toLowerCase();prows.forEach(function(r){r.style.display=(!pq||(r.getAttribute('data-name')||'').indexOf(pq)>=0)?'':'none';});return;}
  case 'sOwner':{var t2=findTask(c,id);if(t2)t2.owner=v;break;}
  case 'sStart':{var t3=findTask(c,id);if(t3)t3.start=v;applySchedule(c);break;}
  case 'sEnd':{var t4=findTask(c,id);if(t4)t4.end=v;applySchedule(c);break;}
  case 'sHours':{var t5=findTask(c,id);if(t5)t5.estHours=v;break;}
  case 'sBuffer':c.bufferBizDays=(v===''?null:Math.max(0,parseInt(v,10)||0));break;
  case 'matSrc':{var m=findMat(c,tid,mid);if(m)m.source=v;refreshWork(c,tid);break;}
  case 'matCnt':{var m2=findMat(c,tid,mid);if(m2)m2.content=v;refreshWork(c,tid);break;}
  case 'taskResult':{var tre=findTask(c,id);if(tre)tre.result=v;refreshWork(c,id);break;}
  case 'schedFilter':_schedOwner=v;break;
  case 'workFilter':_workOwner=v;break;
  case 'oMsg':c.output.message=v;break;
  case 'oStruct':c.output.structure=v;break;
  case 'dMin':c.discussion.minutes=v;break;
  case 'dFb':c.discussion.feedback=v;break;
  case 'dNext':c.discussion.next=v;break;
 }
 save();
 if(el.getAttribute('data-render')==='1')render();
}

/* ===== Microsoft Graph (Outlook) integration =====
   オフライン・localStorage を「真実の源」とし、Graph は任意の同期層。
   ライブ連携は https 配信＋Azure AD アプリ登録が前提（file:// では不可）。 */
function loadMsal(cb,errcb){
 if(window.msal)return cb();
 var s=document.createElement('script');
 s.src='https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js';
 s.onload=function(){cb();};
 s.onerror=function(){if(errcb)errcb();};
 document.head.appendChild(s);
}
function msalReady(){
 if(_msal)return _msal;
 var cfg=GRAPH_CONFIG;
 _msal=new msal.PublicClientApplication({auth:{clientId:cfg.clientId,authority:'https://login.microsoftonline.com/'+(cfg.tenant||'common'),redirectUri:location.origin+location.pathname},cache:{cacheLocation:'localStorage'}});
 var accts=_msal.getAllAccounts();if(accts&&accts.length){_acct=accts[0];_msal.setActiveAccount(_acct);}
 return _msal;
}
function ensureMsal(cb){
 if(location.protocol==='file:'){state.modal='outlookSetup';render();window.alert('Outlookライブ連携は https 配信が必要です（file:// では動作しません）。GitHub Pages 等で公開してからご利用ください。設定手順を開きます。');return;}
 if(!GRAPH_CONFIG.clientId){state.modal='outlookSetup';render();return;}
 loadMsal(function(){msalReady();cb();},function(){window.alert('MSAL ライブラリの読み込みに失敗しました。オンライン環境でお試しください。');});
}
function graphSignIn(){ensureMsal(function(){_msal.loginPopup({scopes:GRAPH_CONFIG.scopes}).then(function(r){_acct=r.account;_msal.setActiveAccount(_acct);render();}).catch(function(e){window.alert('サインインに失敗しました：'+(e&&e.message||e));});});}
function graphSignOut(){if(_msal&&_acct){_msal.logoutPopup({account:_acct}).catch(function(){});}_acct=null;render();}
function graphToken(){
 return _msal.acquireTokenSilent({scopes:GRAPH_CONFIG.scopes,account:_acct||undefined}).then(function(r){_acct=r.account||_acct;return r.accessToken;})
  .catch(function(){return _msal.acquireTokenPopup({scopes:GRAPH_CONFIG.scopes}).then(function(r){_acct=r.account;_msal.setActiveAccount(_acct);return r.accessToken;});});
}
function statusShort(c){return ({todo:'未着手',doing:'進行中',hold:'保留',done:'完了'})[c.taskStatus||'todo'];}
function eventBodyHtml(c){

 L.push('論点：'+esc(c.ronten&&c.ronten.text||'—'));

 L.push('ステータス：'+statusShort(c)+'　重要度：'+(isImportant(c)?'高':'低')+'　緊急度：'+(isUrgent(c)?'高':'低'));
 if(c.requester)L.push('依頼者：'+esc(c.requester));
 return L.join('<br>');

function buildEvent(c){
 var D=parseDate(c.deadline),t=todayDate(),startD=null;
 (c.tasks||[]).forEach(function(tk){var s=parseDate(tk.start);if(s&&(!startD||s<startD))startD=s;});
 if(!startD)startD=(D&&D>t)?t:(D||t);
 var endD=D||startD;if(endD<startD)endD=startD;
 return {subject:'【'+statusShort(c)+'】'+(c.title||'無題のタスク'),
  body:{contentType:'HTML',content:eventBodyHtml(c)},
  isAllDay:true,
  start:{dateTime:fmtISO(startD)+'T00:00:00',timeZone:'Asia/Tokyo'},
  end:{dateTime:fmtISO(addDays(endD,1))+'T00:00:00',timeZone:'Asia/Tokyo'},
  categories:['ロサ・ワークフロー']};
}
function graphPushEvent(c,tok){
 var ev=buildEvent(c),has=c.outlook&&c.outlook.eventId;
 var base='https://graph.microsoft.com/v1.0/me/events';
 var url=has?base+'/'+encodeURIComponent(c.outlook.eventId):base;
 return fetch(url,{method:has?'PATCH':'POST',headers:{'Authorization':'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify(ev)})
  .then(function(res){if(res.status===404&&has){c.outlook.eventId='';return fetch(base,{method:'POST',headers:{'Authorization':'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify(ev)});}return res;})
  .then(function(res){if(!res.ok)return res.text().then(function(tx){throw new Error(res.status+' '+tx);});return res.json();})
  .then(function(j){c.outlook=c.outlook||{};c.outlook.eventId=j.id;c.outlook.webLink=j.webLink||'';c.outlook.syncedAt=Date.now();save();return j;});
}
function graphSync(id){var c=caseById(id);if(!c)return;ensureMsal(function(){graphToken().then(function(tok){return graphPushEvent(c,tok);}).then(function(){render();}).catch(function(e){window.alert('Outlook同期に失敗しました：'+(e&&e.message||e));});});}
function graphSyncToday(){
 var t=todayDate(),tIso=fmtISO(t);
 var todays=state.cases.filter(function(c){if(isTaskDone(c))return false;if(c.planDate===tIso)return true;var D=parseDate(c.deadline);if(D&&(D<t||fmtISO(D)===tIso))return true;return isUrgent(c);});
 if(!todays.length){window.alert('今日のタスクがありません。');return;}
 ensureMsal(function(){graphToken().then(function(tok){
  return todays.reduce(function(p,c){return p.then(function(){return graphPushEvent(c,tok);});},Promise.resolve());
 }).then(function(){render();window.alert('今日のタスク '+todays.length+' 件を Outlook に同期しました。');}).catch(function(e){window.alert('Outlook同期に失敗しました：'+(e&&e.message||e));});});
}

 if(location.protocol==='file:'||!GRAPH_CONFIG.clientId)return;
 if(typeof navigator!=='undefined'&&navigator.onLine===false)return;
 loadMsal(function(){try{msalReady();if(_acct)render();}catch(e){}},function(){});
}
/* ===== LLM (Anthropic) structuring =====
   隠し機能：localStorage通知バナーを5連続クリックで有効化。
   入力テキストを Claude で構造化し、各シート（論点・サブ論点・タスク）に転記。 */
var STRUCT_SCHEMA={type:"object",additionalProperties:false,required:["title","ronten","subRonten","tasks"],properties:{
 title:{type:"string"},
 ronten:{type:"string"},
 subRonten:{type:"array",items:{type:"object",additionalProperties:false,required:["text","children"],properties:{text:{type:"string"},children:{type:"array",items:{type:"string"}}}}},
 tasks:{type:"array",items:{type:"object",additionalProperties:false,required:["text","targets","dependsOn"],properties:{text:{type:"string"},targets:{type:"array",items:{type:"object",additionalProperties:false,required:["sub","child"],properties:{sub:{type:"integer"},child:{type:"integer"}}}},dependsOn:{type:"array",items:{type:"integer"}}}}}
}};
function llmPanelHtml(){
 var h='<div class="card" style="border:1px solid var(--brand-border);background:var(--brand-soft);margin-bottom:12px">';
 h+='<div class="row between center mb2"><b class="small" style="color:var(--brand-dark)">'+ic('spark',15)+' LLMで構造化（実験的）</b><button class="btn-ghost btn-sm" data-click="llmSetup" title="LLM設定">'+ic('gear',14)+'</button></div>';
 if(!LLM_CONFIG.apiKey)h+='<p class="xsmall" style="color:var(--accent-text);margin:0 0 8px">Anthropic APIキーが未設定です。歯車から設定してください。</p>';
 h+='<div class="field" style="margin:0 0 8px"><label class="lblsm">締切（必須）</label><input class="inp" type="date" data-act="llmDeadline" value="'+esc(_llmDraftDeadline)+'"></div>';
 h+='<textarea class="inp" rows="5" data-act="llmDraft" placeholder="依頼内容・状況をそのまま貼り付け（例：来期の営業、どう攻めるか整理しておいて。締切は来週月曜の会議まで…）">'+esc(_llmDraft)+'</textarea>';
 h+='<div class="row gap2 center mt2"><button class="btn btn-brand btn-sm" data-click="llmStructure"'+(_llmBusy?' disabled style="opacity:.5"':'')+'>'+ic('spark',14)+'<span>'+(_llmBusy?'構造化中…':'構造化する')+'</span></button><span class="xsmall muted">入力内容をAIが各シート（論点・サブ論点・タスク）に転記し、新規タスクを作成します。</span></div>';
 h+='</div>';
 return h;
}
function llmSetupHtml(){
 var h='<div class="guide">'+ic('bulb',16)+'<div>「構造化する」は <b>Anthropic API（Claude）</b> を利用します。APIキーはこの端末のブラウザ（localStorage）にのみ保存され、リクエスト時に Anthropic へ直接送信されます。</div></div>';
 h+='<div class="banner banner-accent mb3">'+ic('alert',16)+'<span>ブラウザから直接APIを呼ぶため<b>APIキーがこの端末に保存</b>されます。共有端末では使用しないでください。送信内容・課金はご自身のAnthropicアカウントに紐づきます。社外秘の依頼内容を送る際は組織のデータ取り扱い方針をご確認ください。</span></div>';
 h+='<div class="field"><label class="lbl">Anthropic APIキー</label><input class="inp" type="password" data-act="llmKey" value="'+esc(LLM_CONFIG.apiKey)+'" placeholder="sk-ant-..."></div>';
 h+='<div class="field"><label class="lbl">モデル</label><select class="inp" data-act="llmModel">'+['claude-opus-4-8','claude-sonnet-4-6','claude-haiku-4-5'].map(function(m){return '<option value="'+m+'" '+(LLM_CONFIG.model===m?'selected':'')+'>'+m+'</option>';}).join('')+'</select><div class="hint">既定は claude-opus-4-8。</div></div>';
 return h;
}
function llmCall(prompt){
 return fetch('https://api.anthropic.com/v1/messages',{
  method:'POST',
  headers:{'content-type':'application/json','x-api-key':LLM_CONFIG.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
  body:JSON.stringify({model:LLM_CONFIG.model||'claude-opus-4-8',max_tokens:8000,
   system:'あなたは、仕事の依頼を「やさしい日本語」で整理する係です。むずかしいカタカナ語や横文字（イシュー、タスク、MECE、ロジック、ブレイクダウン 等）やコンサル用語は使わず、昔から働いているベテラン社員にもひと目で分かる、ふつうの言葉で書いてください。依頼の内容を、(1)最終的に答えを出すべき問い (2)その問いを答えやすいように小さく分けた問い (3)その小さな問いに答えるためにやること、の順に日本語で整理します。むずかしい言葉しか思いつかないときは、かみくだいた言い回しに直してください。',
   output_config:{format:{type:'json_schema',schema:STRUCT_SCHEMA}},
   messages:[{role:'user',content:prompt}]})
 }).then(function(res){if(!res.ok)return res.text().then(function(t){throw new Error(res.status+' '+t);});return res.json();})
 .then(function(j){if(j.stop_reason==='refusal')throw new Error('リクエストが拒否されました。');var txt='';(j.content||[]).forEach(function(b){if(b.type==='text')txt+=b.text;});return JSON.parse(txt);});
}
function buildCaseFromStruct(d,deadline,memo){
 var subs=(d.subRonten||[]).map(function(s){return {id:uid(),text:s.text||'',children:(s.children||[]).map(function(ch){return {id:uid(),text:ch};})};});
 var tasks=(d.tasks||[]).map(function(t){var links=(t.targets||[]).map(function(g){var s=subs[g.sub];if(!s)return null;if(g.child==null||g.child<0)return s.id;return (s.children&&s.children[g.child])?s.children[g.child].id:s.id;}).filter(Boolean);return {id:uid(),text:t.text||'',linkIds:links,owner:'',start:'',end:'',estHours:'',predecessorIds:[],done:false,mentality:{},materials:[]};});
 (d.tasks||[]).forEach(function(t,i){if(!tasks[i])return;tasks[i].predecessorIds=(t.dependsOn||[]).map(function(j){return tasks[j]?tasks[j].id:null;}).filter(Boolean).filter(function(id){return id!==tasks[i].id;});});
 return newCase({title:d.title||'（無題のタスク）',requestMemo:memo||'',deadline:deadline||'',
  ronten:{text:d.ronten||'',checks:{isQuestion:false,matchesGoal:false,oneSentence:false}},
  subRonten:subs,subAgreed:false,tasks:tasks});
}
function llmStructure(){
 if(!LLM_CONFIG.enabled||_llmBusy)return;
 if(!LLM_CONFIG.apiKey){window.alert('先にAPIキーを設定してください（歯車）。');state.modal='llmSetup';render();return;}
 if(!_llmDraftDeadline){window.alert('先に締切を指定してください。');return;}
 if(!(_llmDraft||'').trim()){window.alert('テキストを入力してください。');return;}
 _llmBusy=true;render();
 var prompt='次の依頼を、あとで仕事を進めやすいように整理してください。\n\n--- 依頼の内容 ---\n'+_llmDraft+'\n\n【書き方のお願い】\n・むずかしい言葉やカタカナ語（イシュー、タスク、MECE、ブレイクダウン 等）は使わず、誰でも分かるやさしい日本語で書く。\n・短く、はっきりと。一文を長くしない。\n・「〜の最適化」「〜のスキーム」などの曖昧な横文字ではなく、具体的に何をするかを書く。\n\n【整理して入れる項目】（かっこ内の英語は項目名なのでそのまま、中身だけ書く）\n- title: この仕事の名前（ひとことで・30文字以内）\n- ronten: 最終的に答えを出すべき「問い」を、ひとつの文（〜か？）で\n- subRonten: その問いを、答えやすいように小さく分けた問いの一覧。各要素は text（小さく分けた問い）と children（さらに細かく分けた問いの文字列の一覧。なければ空）\n- tasks: 上の小さな問いに答えるために「やること」の一覧。各要素は text（やること）と targets（その「やること」が答える問いの指定の一覧）と dependsOn（先にやっておくべき「やること」の番号の一覧）。\n  targets の各要素は sub と child の番号で指定する：\n  ・sub … 何番目の subRonten か（0から数える）\n  ・child … その subRonten の何番目の children（サブサブ問い）か（0から数える）。children ではなく subRonten 自体に割り当てるときは -1。\n  dependsOn は「この やること を始める前に、終わらせておくべき別の やること」の番号（tasks の何番目か・0から数える）の一覧。順番の決まりがなければ空にする。\n\n【とても大切なルール】\n・subRonten のすべての問いと、すべての children（サブサブ問い）に、必ず1つ以上の「やること」を割り当てること（割り当て漏れを作らない）。\n・children があるサブサブ問いには、その child を指す targets（sub と 0以上の child）を必ず作る。\n・段取り（順番）を考え、先に終わらせるべき作業がある「やること」には dependsOn を設定する（例：「調べる」を終えてから「考える・まとめる」を始める）。自分自身は指定しない。順番がぐるぐる回らない（循環しない）ようにする。';
 llmCall(prompt).then(function(data){
  var c=buildCaseFromStruct(data,_llmDraftDeadline,_llmDraft);
  state.cases.push(c);state.selectedId=c.id;state.reporting=false;_llmBusy=false;_llmDraft='';_llmDraftDeadline='';save();render();
 }).catch(function(e){_llmBusy=false;render();window.alert('構造化に失敗しました：'+(e&&e.message||e));});
}
function handleClick(act,el){
 var id=el.getAttribute('data-id'),sid=el.getAttribute('data-sid'),pid=el.getAttribute('data-pid'),cid=el.getAttribute('data-cid'),tid=el.getAttribute('data-tid'),mid=el.getAttribute('data-mid'),i=el.getAttribute('data-i');
 var c=sel();
 switch(act){
  /* app/navigation */
  case 'home':case 'back':state.selectedId=null;state.reporting=false;state.modal=null;render();return;
  case 'closeModal':state.modal=null;render();return;
  case 'slide':state.modal='slide';render();return;
  case 'manual':state.modal='manual';render();return;
  case 'sources':state.modal='sources';render();return;
  case 'import':document.getElementById('filein').click();return;
  case 'export':{var blob=new Blob([JSON.stringify(state.cases,null,2)],{type:'application/json'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='rosatsusakua_backup.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);return;}
  case 'sample':state.cases.push(sampleCase());save();render();return;
  case 'new':{var nc=newCase();state.cases.push(nc);state.selectedId=nc.id;state.reporting=false;save();render();return;}
  case 'open':state.selectedId=id;state.reporting=false;render();return;
  /* task management */
  case 'impToggle':{var ci=caseById(id);if(ci){ci.importance=isImportant(ci)?'low':'high';save();render();}return;}
  case 'todayToggle':{var ct=caseById(id);if(ct){var ti=fmtISO(todayDate());ct.planDate=(ct.planDate===ti)?'':ti;save();render();}return;}
  case 'showDone':_showDone=!_showDone;render();return;
  case 'researchToggle':{var cr=caseById(id);if(cr){cr.isResearchTask=!cr.isResearchTask;save();render();}return;}
  case 'researchFilterToggle':_researchFilter=!_researchFilter;render();return;
  /* outlook */
  case 'outlookSignIn':graphSignIn();return;
  case 'outlookSignOut':graphSignOut();return;
  case 'outlookSync':graphSync(id);return;
  case 'outlookSyncToday':graphSyncToday();return;
  case 'outlookSetup':state.modal='outlookSetup';render();return;
  /* LLM structuring (hidden: 5 taps on the localStorage banner) */
  case 'llmTap':{_llmTaps++;if(_llmTapTimer)clearTimeout(_llmTapTimer);_llmTapTimer=setTimeout(function(){_llmTaps=0;},1600);if(_llmTaps>=5){_llmTaps=0;LLM_CONFIG.enabled=!LLM_CONFIG.enabled;saveLlmCfg();if(!LLM_CONFIG.enabled&&state.modal==='llmSetup')state.modal=null;render();window.alert(LLM_CONFIG.enabled?'LLM機能を有効化しました。一覧下部の入力欄にテキストを貼り、締切を指定して「構造化する」を押すと、各シートに転記されます。':'LLM機能を非表示にしました。再度このバナーを5回クリックすると表示されます。');}return;}
  case 'llmSetup':state.modal='llmSetup';render();return;
  case 'llmStructure':llmStructure();return;
  case 'del':{if(!window.confirm('この案件を削除しますか？（元に戻せません）'))return;state.cases=state.cases.filter(function(x){return x.id!==id;});if(state.selectedId===id){state.selectedId=null;state.reporting=false;}save();render();return;}
  case 'report':state.reporting=true;render();return;
  case 'reportBack':state.reporting=false;render();return;
  case 'print':window.print();return;
  case 'complete':if(c){c.stepDone.discussion=true;c.taskStatus='done';c.planDate='';}state.selectedId=null;state.reporting=false;save();render();return;
 }
 if(!c)return;
 switch(act){
  case 'go':c.currentStep=parseInt(i,10)||0;save();render();return;
  case 'prev':if(c.currentStep>0)c.currentStep--;save();render();return;
  case 'next':{var msg=canAdvance(c);if(msg){window.alert(msg);return;}c.stepDone[STEPS[c.currentStep].key]=true;if(c.currentStep<STEPS.length-1)c.currentStep++;save();render();return;}
  /* ronten checks */
  case 'rc_isQuestion':c.ronten.checks.isQuestion=!c.ronten.checks.isQuestion;break;
  case 'rc_matchesGoal':c.ronten.checks.matchesGoal=!c.ronten.checks.matchesGoal;break;
  case 'rc_oneSentence':c.ronten.checks.oneSentence=!c.ronten.checks.oneSentence;break;
  /* sub */
  case 'addSub':c.subRonten.push({id:uid(),text:'',children:[]});break;
  case 'exportSub':_subText=buildSubText(c);break;
  case 'subEditorToggle':_subEditorOpen=!_subEditorOpen;break;
  case 'importSub':{var parsed=parseSubText(_subText);if(!parsed.subs.length){window.alert('読み込めるサブ論点がありません。1行に1つ、サブ論点を書いてください。');return;}if(!window.confirm('テキストの内容で、現在の論点・サブ論点（'+(c.subRonten||[]).length+'件）を置き換えます。よろしいですか？'))return;if(c.ronten&&parsed.ronten)c.ronten.text=parsed.ronten;c.subRonten=parsed.subs;break;}
  case 'delSub':c.subRonten=c.subRonten.filter(function(s){return s.id!==id;});break;
  case 'addChild':{var s=findSub(c,id);if(s){s.children=s.children||[];s.children.push({id:uid(),text:''});}break;}
  case 'delChild':{var s3=findSub(c,pid);if(s3)s3.children=(s3.children||[]).filter(function(x){return x.id!==cid;});break;}
  case 'subAgree':c.subAgreed=!c.subAgreed;break;
  /* task */
  case 'addTask':c.tasks.push({id:uid(),text:'',linkIds:[],owner:'',start:'',end:'',estHours:'',predecessorIds:[],done:false,mentality:{},materials:[]});break;
  case 'delTask':{c.tasks=c.tasks.filter(function(t){return t.id!==id;});c.tasks.forEach(function(t){if(t.predecessorIds)t.predecessorIds=t.predecessorIds.filter(function(pid){return pid!==id;});});break;}
  case 'predToggle':{var tp=findTask(c,id);if(tp){var pl=getPreds(tp).slice();var ix=pl.indexOf(sid);if(ix>=0)pl.splice(ix,1);else pl.push(sid);tp.predecessorIds=pl;if(tp.predecessorId!==undefined)delete tp.predecessorId;applySchedule(c);}break;}
  case 'taskUp':{var iu=-1;c.tasks.forEach(function(t,k){if(t.id===id)iu=k;});if(iu>0){var tu=c.tasks[iu-1];c.tasks[iu-1]=c.tasks[iu];c.tasks[iu]=tu;}break;}
  case 'taskDown':{var idn=-1;c.tasks.forEach(function(t,k){if(t.id===id)idn=k;});if(idn>=0&&idn<c.tasks.length-1){var td=c.tasks[idn+1];c.tasks[idn+1]=c.tasks[idn];c.tasks[idn]=td;}break;}
  case 'link':{var t=findTask(c,id);if(t){var links=getLinks(t).slice();var ix=links.indexOf(sid);if(ix>=0)links.splice(ix,1);else links.push(sid);t.linkIds=links;if(t.linkId)delete t.linkId;}break;}
  case 'taskSel':{if(_taskSel[sid])delete _taskSel[sid];else _taskSel[sid]=true;break;}
  case 'addTaskSel':{var nm=(_taskName||'').trim();var selIds=Object.keys(_taskSel).filter(function(k){return _taskSel[k];});if(!nm){window.alert('タスク名を入力してください。');return;}if(!selIds.length){window.alert('解決するサブ論点を1つ以上チェックしてください。');return;}if(_taskEditId){var teu=findTask(c,_taskEditId);if(teu){teu.text=nm;teu.linkIds=selIds;if(teu.linkId)delete teu.linkId;}}else{c.tasks.push({id:uid(),text:nm,linkIds:selIds,owner:'',start:'',end:'',estHours:'',predecessorIds:[],done:false,result:'',mentality:{},materials:[]});}_taskName='';_taskSel={};_taskEditId=null;break;}
  case 'taskEdit':{var ted=findTask(c,id);if(ted){_taskEditId=id;_taskName=ted.text||'';_taskSel={};getLinks(ted).forEach(function(s5){_taskSel[s5]=true;});}break;}
  case 'taskCancelEdit':_taskEditId=null;_taskName='';_taskSel={};break;
  case 'predOpen':_predOpen=(_predOpen===id?null:id);_predQuery='';_predPick=null;break;
  case 'predPick':_predPick=sid;break;
  case 'predAdd':{var tpa=findTask(c,id);if(tpa){if(!_predPick){window.alert('追加する先行タスクをプルダウンから選んでください。');return;}var pls=getPreds(tpa).slice();if(pls.indexOf(_predPick)<0)pls.push(_predPick);tpa.predecessorIds=pls;if(tpa.predecessorId!==undefined)delete tpa.predecessorId;_predPick=null;_predQuery='';applySchedule(c);}break;}
  /* work */
  case 'wm_thinkFirst':{var t7=findTask(c,id);if(t7){t7.mentality=t7.mentality||{};t7.mentality.thinkFirst=!t7.mentality.thinkFirst;}break;}
  case 'wm_surprise':{var t8=findTask(c,id);if(t8){t8.mentality=t8.mentality||{};t8.mentality.surprise=!t8.mentality.surprise;}break;}
  case 'wm_thorough':{var t9=findTask(c,id);if(t9){t9.mentality=t9.mentality||{};t9.mentality.thorough=!t9.mentality.thorough;}break;}
  case 'addMat':{var ta=findTask(c,id);if(ta){ta.materials=ta.materials||[];ta.materials.push({id:uid(),source:'',content:''});}break;}
  case 'delMat':{var tb=findTask(c,tid);if(tb)tb.materials=(tb.materials||[]).filter(function(m){return m.id!==mid;});break;}
  case 'wResearch':{var tr=findTask(c,id);if(tr){tr.research=!isResearchTask(tr);}break;}
  case 'workDone':{var tc=findTask(c,id);if(tc){if(tc.done)tc.done=false;else if((tc.result||'').trim())tc.done=true;}break;}
  /* output */
  case 'oc_separate':c.output.checks.separate=!c.output.checks.separate;break;
  case 'oc_closePpt':c.output.checks.closePpt=!c.output.checks.closePpt;break;
  /* discussion */
  case 'dc_noTossOver':c.discussion.noTossOver=!c.discussion.noTossOver;break;
  case 'dc_discussed':c.discussion.discussed=!c.discussion.discussed;break;
  case 'dc_wordBased':c.discussion.wordBased=!c.discussion.wordBased;break;
  /* modals needing a selected case */
  case 'copilotOut':state.modal='copilotOut';render();return;
  case 'copilotMin':state.modal='copilotMin';render();return;
  case 'autoSchedule':autoSchedule();return;
  default:return;
 }
 save();render();
}

 handleClick(el.getAttribute('data-click'),el);

 });}

 load();
